<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Munpia Insight Scraper</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>Munpia <span class="accent">Insight</span></h1>
      <p class="subtitle">문피아 지표 분석 도구</p>
    </header>

    <div id="status" class="status-box">
      <div class="loader"></div>
      <p>작품 정보를 분석하는 중입니다...</p>
    </div>

    <div id="results" class="results-container hidden">
      <div class="result-card title-card">
        <h2 id="novel-title">작품 제목</h2>
      </div>

      <div class="stats-grid">
        <div class="stat-item">
          <label>전체 연재수</label>
          <div id="serial-count" class="stat-value">0</div>
        </div>
        <div class="stat-item">
          <label>최신 -1화 조회수</label>
          <div id="latest-vcount" class="stat-value">0</div>
        </div>
        <div class="stat-item">
          <label>최신 -1화 추천수</label>
          <div id="latest-rcount" class="stat-value">0</div>
        </div>
        <div class="stat-item highlight">
          <label>연독률 (3화/첫4화)</label>
          <div id="read-rate" class="stat-value">0.000</div>
        </div>
      </div>

      <div class="details-box">
        <p id="analysis-summary">최신 -3화 조회수: <span id="n-val">0</span> / 첫 4화 조회수: <span id="d-val">0</span></p>
      </div>

      <button id="download-btn" class="primary-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        엑셀(CSV) 다운로드
      </button>
    </div>

    <div id="error" class="error-box hidden">
      <p id="error-message">대상 페이지가 아니거나 분석에 실패했습니다.</p>
    </div>

    <footer>
      <p>© 2024 Munpia Scraper v1.0</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
