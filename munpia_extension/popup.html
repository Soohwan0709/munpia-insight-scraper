<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Munpia Data Extractor</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #1f2937;
      --progress-bg: #e5e7eb;
      --progress-fill: #10b981;
    }

    body {
      width: 380px;
      margin: 0;
      padding: 24px;
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin: 0 0 8px 0;
      background: linear-gradient(135deg, #4f46e5, #ec4899);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    p {
      font-size: 0.875rem;
      color: #6b7280;
      text-align: center;
      margin-bottom: 24px;
    }

    .options {
      margin-bottom: 24px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .radio-option {
      position: relative;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .radio-option:hover {
      border-color: var(--primary);
      background: #f5f3ff;
    }

    .radio-option input {
      display: none;
    }

    .radio-option.selected {
      border-color: var(--primary);
      background: #f5f3ff;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .radio-label {
      font-weight: 600;
      font-size: 1rem;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 10px -1px rgba(79, 70, 229, 0.3);
    }

    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }

    .status-container {
      margin-top: 16px;
      display: none;
    }

    .status-text {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .progress-bar {
      height: 8px;
      background: var(--progress-bg);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--progress-fill);
      width: 0%;
      transition: width 0.3s ease;
    }

    .log {
      margin-top: 12px;
      font-size: 0.75rem;
      color: #6b7280;
      max-height: 80px;
      overflow-y: auto;
      text-align: left;
      border-top: 1px solid #f3f4f6;
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Munpia Pro</h1>
    <p>Munpia Best Analysis tool</p>

    <div class="options">
      <div class="radio-group" id="categoryGroup">
        <label class="radio-option selected" for="rookie">
          <input type="radio" name="category" id="rookie" value="rookie" checked>
          <span class="radio-label">신인 베스트 (Rookie)</span>
        </label>
        <label class="radio-option" for="new">
          <input type="radio" name="category" id="new" value="new">
          <span class="radio-label">신규 베스트 (New)</span>
        </label>
      </div>
    </div>

    <button id="startBtn" class="btn">데이터 추출 시작</button>

    <div id="statusContainer" class="status-container">
      <div class="status-text">
        <span id="progressLabel">Initializing...</span>
        <span id="progressPercent">0/100</span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div id="logArea" class="log">Processing queue...</div>
    </div>
  </div>

  <script src="xlsx.mini.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
